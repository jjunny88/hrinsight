<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HR 모닝 브리프</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --paper:#F3F1EC; --ink:#1A2238; --ink-soft:#46506B; --line:#DAD6CC;
    --accent:#B23A48; --card:#FBFAF7;
    --c-채용:#0E7C7B; --c-노무:#C2703D; --c-평가보상:#3D5A80;
    --c-조직문화:#8E5572; --c-HR테크:#566246; --c-기타:#8A8578;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--paper);
    color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px 80px}

  /* 마스트헤드 */
  header{border-bottom:2.5px solid var(--ink);padding:34px 0 18px;margin-bottom:4px}
  .mast{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
  .brand{font-size:38px;font-weight:800;letter-spacing:-1.2px;line-height:1}
  .brand .accent{color:var(--accent)}
  .mast .meta{font-size:12.5px;color:var(--ink-soft);text-align:right;
    font-variant-numeric:tabular-nums}
  .mast .meta .date{font-size:15px;font-weight:600;color:var(--ink)}
  .kicker{font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:var(--ink-soft);font-weight:600;margin-bottom:8px}

  /* 카테고리 분포 바 (시그니처) */
  .distrib{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:18px 0 6px;
    border:1px solid var(--line)}
  .distrib span{transition:width .6s ease}
  .legend{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:12px;color:var(--ink-soft);
    padding-bottom:24px;border-bottom:1px solid var(--line)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;
    vertical-align:middle}

  /* 차트 영역 */
  .charts{display:grid;grid-template-columns:1fr 1.5fr;gap:28px;margin:28px 0 8px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px}
  .panel h3{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:14px;font-weight:600}
  .chart-box{position:relative;height:200px}

  /* 필터 */
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin:34px 0 20px;align-items:center}
  .filters .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--ink-soft);margin-right:4px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    font-family:inherit;font-size:13px;padding:6px 13px;border-radius:20px;cursor:pointer;
    transition:all .15s;font-weight:500}
  .chip:hover{border-color:var(--ink-soft)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px}

  /* 기사 리스트 */
  .count-line{font-size:13px;color:var(--ink-soft);margin-bottom:14px;
    font-variant-numeric:tabular-nums}
  article{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);
    border-radius:8px;padding:16px 20px;margin-bottom:10px;transition:border-color .15s}
  article:hover{border-left-color:var(--accent)}
  .a-top{display:flex;justify-content:space-between;gap:14px;align-items:baseline;
    margin-bottom:6px;flex-wrap:wrap}
  .cat{font-size:11px;font-weight:700;letter-spacing:.3px;padding:2px 8px;border-radius:4px;
    color:#fff;white-space:nowrap}
  .a-date{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .a-title{font-size:17px;font-weight:600;line-height:1.4;letter-spacing:-.3px}
  .a-title a{color:var(--ink);text-decoration:none}
  .a-title a:hover{color:var(--accent)}
  .a-sum{font-size:14px;color:var(--ink-soft);margin-top:5px}
  .a-src{font-size:12px;color:var(--ink-soft);margin-top:8px;opacity:.85}
  .a-src::before{content:"●";font-size:6px;vertical-align:middle;margin-right:6px;
    color:var(--accent)}

  .empty{text-align:center;padding:50px;color:var(--ink-soft);font-size:14px}
  .banner{background:#FFF6E6;border:1px solid #E8D49A;color:#7A5B12;font-size:12.5px;
    padding:9px 14px;border-radius:8px;margin:18px 0;text-align:center}
  .banner code{background:#fff;padding:1px 5px;border-radius:3px;font-size:11.5px}

  @media(max-width:720px){
    .charts{grid-template-columns:1fr}
    .brand{font-size:30px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">매일 오전 자동 수집 · 인사·노무·조직 인텔리전스</div>
    <div class="mast">
      <div class="brand">HR <span class="accent">모닝</span> 브리프</div>
      <div class="meta">
        <div class="date" id="today">—</div>
        <div id="updated">데이터 불러오는 중…</div>
      </div>
    </div>
    <div class="distrib" id="distrib"></div>
    <div class="legend" id="legend"></div>
  </header>

  <div id="banner"></div>

  <div class="charts">
    <div class="panel">
      <h3>카테고리 분포</h3>
      <div class="chart-box"><canvas id="donut"></canvas></div>
    </div>
    <div class="panel">
      <h3>최근 7일 수집 추이</h3>
      <div class="chart-box"><canvas id="trend"></canvas></div>
    </div>
  </div>

  <div class="filters" id="filters">
    <span class="lbl">필터</span>
  </div>

  <div class="count-line" id="countLine"></div>
  <div id="list"></div>

</div>

<script>
// ===== 설정: 배포한 Apps Script 웹 앱 URL 을 여기에 붙여넣으세요 ============
const WEB_APP_URL = ''; // 예: https://script.google.com/macros/s/AKfy.../exec
// =========================================================================

const CAT_COLORS = {
  '채용':'#0E7C7B','노무':'#C2703D','평가보상':'#3D5A80',
  '조직문화':'#8E5572','HR테크':'#566246','기타':'#8A8578'
};
const ORDER = ['채용','노무','평가보상','조직문화','HR테크','기타'];

let ALL = [];
let activeCat = '전체';

const DEMO = {
  updatedAt:new Date().toISOString(),
  articles:[
    {category:'노무',title:'주 4.5일제 시범 도입 기업 늘어… 노사 협의 쟁점은',pubDate:daysAgo(0),summary:'근로시간 단축 논의가 공공·대기업 중심으로 확산되고 있다.',source:'한국경제'},
    {category:'채용',title:'2026 상반기 채용 키워드는 \'직무 적합성\'과 AI 면접',pubDate:daysAgo(0),summary:'역량 기반 평가와 구조화 면접 도입이 빠르게 늘고 있다.',source:'매일경제'},
    {category:'평가보상',title:'성과급 산정 방식 투명성 요구 커진다',pubDate:daysAgo(1),summary:'평가 기준 공개와 보상 연계의 객관성이 화두로 떠올랐다.',source:'아시아경제'},
    {category:'HR테크',title:'피플 애널리틱스, HR 의사결정의 표준 되나',pubDate:daysAgo(1),summary:'데이터 기반 인사 관리 도입 기업의 성과 사례가 공유됐다.',source:'전자신문'},
    {category:'조직문화',title:'MZ세대 리텐션, \'성장 경험\'이 보상보다 앞섰다',pubDate:daysAgo(2),summary:'직원 몰입도 조사에서 학습·성장 기회가 핵심 요인으로 꼽혔다.',source:'HR인사이트'},
    {category:'노무',title:'개정 근로기준법 시행령, 인사담당자가 챙길 포인트',pubDate:daysAgo(2),summary:'연차·휴게시간 산정 기준 변경에 따른 실무 대응이 필요하다.',source:'노동법률'},
    {category:'채용',title:'경력직 수시채용 확대… 채용 브랜딩 경쟁 심화',pubDate:daysAgo(3),summary:'직무별 상시 채용 전환으로 인재 풀 관리가 중요해졌다.',source:'서울경제'},
    {category:'평가보상',title:'OKR 도입 3년, 평가 제도와의 연계가 관건',pubDate:daysAgo(4),summary:'목표관리와 인사평가의 정합성 확보가 다음 과제로 지목됐다.',source:'CEO스코어'},
  ].map(a=>({...a,link:'#',keyword:''}))
};

function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString();}

async function load(){
  document.getElementById('today').textContent = fmtDate(new Date(),true);
  if(!WEB_APP_URL){
    banner('데모 데이터를 표시 중입니다. <code>WEB_APP_URL</code> 에 배포한 웹 앱 주소를 넣으면 실제 수집 기사가 나타납니다.');
    render(DEMO); return;
  }
  try{
    const res = await fetch(WEB_APP_URL);
    const data = await res.json();
    if(!data.articles || !data.articles.length){
      banner('아직 수집된 기사가 없습니다. Apps Script 에서 <code>collectHRNews()</code> 를 한 번 실행해 보세요.');
      render(DEMO); return;
    }
    render(data);
  }catch(e){
    banner('데이터를 불러오지 못했습니다. 웹 앱 배포 설정(액세스: 모든 사용자)을 확인하세요. 지금은 데모를 표시합니다.');
    render(DEMO);
  }
}

function banner(html){document.getElementById('banner').innerHTML='<div class="banner">'+html+'</div>';}

function render(data){
  ALL = data.articles;
  document.getElementById('updated').textContent =
    '업데이트 ' + fmtDate(new Date(data.updatedAt),false);
  buildDistrib();
  buildFilters();
  drawDonut();
  drawTrend();
  renderList();
}

function counts(){
  const c={}; ORDER.forEach(k=>c[k]=0);
  ALL.forEach(a=>{const k=c[a.category]!==undefined?a.category:'기타';c[k]++;});
  return c;
}

function buildDistrib(){
  const c=counts(), total=ALL.length||1;
  const bar=document.getElementById('distrib'), leg=document.getElementById('legend');
  bar.innerHTML=''; leg.innerHTML='';
  ORDER.forEach(k=>{
    if(!c[k])return;
    const s=document.createElement('span');
    s.style.width=(c[k]/total*100)+'%';
    s.style.background=CAT_COLORS[k];
    bar.appendChild(s);
    leg.insertAdjacentHTML('beforeend',
      `<span><i style="background:${CAT_COLORS[k]}"></i>${k} ${c[k]}</span>`);
  });
}

function buildFilters(){
  const box=document.getElementById('filters');
  box.querySelectorAll('.chip').forEach(e=>e.remove());
  const c=counts();
  const cats=['전체',...ORDER.filter(k=>c[k])];
  cats.forEach(k=>{
    const b=document.createElement('button');
    b.className='chip'+(k===activeCat?' on':'');
    b.innerHTML = k==='전체' ? '전체 '+ALL.length
      : `<span class="dot" style="background:${CAT_COLORS[k]}"></span>${k} ${c[k]}`;
    b.onclick=()=>{activeCat=k;buildFilters();renderList();};
    box.appendChild(b);
  });
}

function renderList(){
  const list=document.getElementById('list');
  const items=activeCat==='전체'?ALL:ALL.filter(a=>a.category===activeCat);
  document.getElementById('countLine').textContent=items.length+'건의 기사';
  if(!items.length){list.innerHTML='<div class="empty">표시할 기사가 없습니다.</div>';return;}
  list.innerHTML=items.map(a=>{
    const col=CAT_COLORS[a.category]||CAT_COLORS['기타'];
    const link=a.link&&a.link!=='#'?`href="${a.link}" target="_blank" rel="noopener"`:'';
    return `<article style="border-left-color:${col}">
      <div class="a-top">
        <span class="cat" style="background:${col}">${a.category||'기타'}</span>
        <span class="a-date">${fmtDate(new Date(a.pubDate),true)}</span>
      </div>
      <div class="a-title"><a ${link}>${esc(a.title)}</a></div>
      ${a.summary?`<div class="a-sum">${esc(a.summary)}</div>`:''}
      ${a.source?`<div class="a-src">${esc(a.source)}</div>`:''}
    </article>`;
  }).join('');
}

let donutChart, trendChart;
function drawDonut(){
  const c=counts();
  const labels=ORDER.filter(k=>c[k]);
  const ctx=document.getElementById('donut');
  if(donutChart)donutChart.destroy();
  donutChart=new Chart(ctx,{type:'doughnut',
    data:{labels,datasets:[{data:labels.map(k=>c[k]),
      backgroundColor:labels.map(k=>CAT_COLORS[k]),borderWidth:2,borderColor:'#FBFAF7'}]},
    options:{cutout:'62%',plugins:{legend:{position:'bottom',
      labels:{boxWidth:10,boxHeight:10,font:{size:11,family:'Pretendard'},padding:12,color:'#46506B'}}}}});
}

function drawTrend(){
  const days=[],labels=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);
    days.push(d.toDateString());labels.push((d.getMonth()+1)+'/'+d.getDate());}
  const data=days.map(d=>ALL.filter(a=>new Date(a.pubDate).toDateString()===d).length);
  const ctx=document.getElementById('trend');
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(ctx,{type:'line',
    data:{labels,datasets:[{data,borderColor:'#B23A48',backgroundColor:'rgba(178,58,72,.08)',
      fill:true,tension:.35,pointRadius:3,pointBackgroundColor:'#B23A48',borderWidth:2}]},
    options:{plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{precision:0,color:'#46506B',font:{size:11}},
        grid:{color:'#EAE7DF'}},
        x:{ticks:{color:'#46506B',font:{size:11}},grid:{display:false}}}}});
}

function fmtDate(d,withWeekday){
  if(isNaN(d))return '—';
  const w=['일','월','화','수','목','금','토'][d.getDay()];
  const base=`${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
  return withWeekday?`${base} (${w})`:`${base} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

load();
</script>
</body>
</html>
